<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>运营数据看板</title>
</head>
<body>
  <div class="pptx-deck"
       data-design-system="dashboard-data"
       data-deck-title="运营数据看板"
       data-language="zh-CN">
    <section class="pptx-slide" data-type="dashboard" data-notes="2026 Q1 核心指标一页概览">
      <h1>运营数据看板</h1>
      <p class="subtitle">2026 Q1 核心指标概览</p>

      <div class="cards" data-cols="2">
        <div class="card">
          <h3>日活用户</h3>
          <p class="metric">128,400</p>
          <p>环比 +12%</p>
        </div>
        <div class="card">
          <h3>转化率</h3>
          <p class="metric">4.8%</p>
          <p>环比 +0.3pt</p>
        </div>
        <div class="card">
          <h3>客单价</h3>
          <p class="metric">¥286</p>
          <p>环比 +5%</p>
        </div>
        <div class="card">
          <h3>留存率</h3>
          <p class="metric">62%</p>
          <p>环比 -1pt</p>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>渠道</th>
            <th>访问量</th>
            <th>转化率</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>自然搜索</td>
            <td>45,200</td>
            <td>5.2%</td>
          </tr>
          <tr>
            <td>付费广告</td>
            <td>32,100</td>
            <td>3.1%</td>
          </tr>
          <tr>
            <td>社交推荐</td>
            <td>18,900</td>
            <td>6.8%</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
