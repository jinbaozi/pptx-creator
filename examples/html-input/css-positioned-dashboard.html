<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CSS 布局看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e2e8f0; }
    .pptx-slide {
      position: relative;
      width: 1280px;
      height: 720px;
      margin: 0 auto;
      background: #f8fafc;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #111827;
    }
    .title {
      position: absolute;
      left: 90px;
      top: 42px;
      width: 1100px;
      height: 58px;
      font-size: 36px;
      font-weight: 700;
      line-height: 58px;
    }
    .subtitle {
      position: absolute;
      left: 90px;
      top: 108px;
      width: 900px;
      height: 36px;
      font-size: 18px;
      color: #64748b;
      line-height: 36px;
    }
    .metric-card {
      position: absolute;
      width: 540px;
      height: 160px;
      padding: 24px;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #dbeafe;
      box-shadow: 0 8px 24px rgba(37, 99, 235, 0.08);
    }
    .metric-card.one { left: 90px; top: 180px; }
    .metric-card.two { left: 650px; top: 180px; }
    .metric-card h3 {
      font-size: 18px;
      color: #2563eb;
      margin-bottom: 12px;
    }
    .metric-card .metric {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .metric-card p:last-child {
      font-size: 14px;
      color: #64748b;
    }
    .channel-table {
      position: absolute;
      left: 90px;
      top: 380px;
      width: 1100px;
      height: 280px;
      border-collapse: collapse;
      background: #ffffff;
      border: 1px solid #dbeafe;
    }
    .channel-table th,
    .channel-table td {
      border: 1px solid #dbeafe;
      padding: 14px 18px;
      text-align: left;
      font-size: 14px;
    }
    .channel-table th {
      background: #eff6ff;
      color: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="pptx-deck"
       data-design-system="dashboard-data"
       data-deck-title="CSS 布局看板"
       data-language="zh-CN">
    <section class="pptx-slide" data-type="dashboard" data-notes="CSS-positioned dashboard for Playwright measurement">
      <h1 class="title"
          data-pptx-kind="text"
          data-pptx-id="title"
          data-typography="h1">CSS 布局看板</h1>
      <p class="subtitle"
         data-pptx-kind="text"
         data-pptx-id="subtitle"
         data-typography="subtitle">2026 Q1 核心指标概览</p>

      <div class="metric-card one"
           data-pptx-kind="card"
           data-pptx-id="card-dau">
        <h3>日活用户</h3>
        <p class="metric">128,400</p>
        <p>环比 +12%</p>
      </div>
      <div class="metric-card two"
           data-pptx-kind="card"
           data-pptx-id="card-conversion">
        <h3>转化率</h3>
        <p class="metric">4.8%</p>
        <p>环比 +0.3pt</p>
      </div>

      <table class="channel-table"
             data-pptx-kind="table"
             data-pptx-id="channel-table">
        <thead>
          <tr>
            <th>渠道</th>
            <th>访问量</th>
            <th>转化率</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>自然搜索</td>
            <td>45,200</td>
            <td>5.2%</td>
          </tr>
          <tr>
            <td>付费广告</td>
            <td>32,100</td>
            <td>3.1%</td>
          </tr>
          <tr>
            <td>社交推荐</td>
            <td>18,900</td>
            <td>6.8%</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
