<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cover — bad</title>
<style>
  body { font-family: "Inter", "Helvetica Neue", Georgia, monospace; margin: 24px; color: #111; background: #fafafa; }
  h1 { font-family: "Playfair Display", Georgia, serif; font-size: 14pt; line-height: 1.0; color: #d23f3f; margin: 0 0 6px; font-weight: 800; letter-spacing: -0.5px; }
  p  { font-family: "Inter", monospace; font-size: 9pt; line-height: 1.0; color: #444; margin: 0 0 6px; }
  .hero { display: flex; gap: 2px; align-items: center; }
  .hero .dot { width: 12px; height: 12px; border-radius: 50%; background: #d23f3f; }
  .hero .bar { width: 12px; height: 12px; background: #f0a020; }
  .hero .tri { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 12px solid #2070d0; }
  .accent { width: 24px; height: 24px; border-radius: 6px; background: #20d090; }
  .card  { background: #fff; border: 1px solid #ddd; border-radius: 2px; padding: 1px; margin-top: 1px; }
  .ribbon { background: #7a3fd0; color: #fff; padding: 1px 2px; border-radius: 4px; font-size: 7pt; font-family: Georgia, serif; }
</style>
</head>
<body>
  <h1>Compiler Infra 2026</h1>
  <p>Hello and welcome to our brand new multi-product compiler infrastructure announcement, where we are very excited to share the next generation of compilation technology with the world.</p>
  <div class="hero">
    <span class="dot"></span><span class="bar"></span><span class="tri"></span>
    <span class="dot"></span><span class="bar"></span><span class="tri"></span>
    <span class="dot"></span><span class="bar"></span><span class="tri"></span>
    <span class="dot"></span><span class="bar"></span><span class="tri"></span>
  </div>
  <div class="accent"></div>
  <div class="card"><span class="ribbon">PRO</span></div>
</body>
</html>
