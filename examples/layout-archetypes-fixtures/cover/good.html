<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cover — good</title>
<style>
  body { font-family: "Inter", "Helvetica Neue", Arial, sans-serif; margin: 56px; color: #1a1a1a; background: #ffffff; }
  h1 { font-size: 40pt; line-height: 1.1; color: {colors.primary}; margin: 0 0 16px; font-weight: 700; letter-spacing: -0.5px; font-family: "Inter", sans-serif; }
  p  { font-size: 16pt; line-height: 1.35; color: #4a4a4a; margin: 0; max-width: 720px; }
  .accent-rule { width: 64px; height: 4px; background: {colors.accent}; margin: 24px 0; border-radius: 2px; }
  .wordmark { font-size: 12pt; line-height: 1.4; color: #6a6a6a; margin-top: 32px; letter-spacing: 1px; text-transform: uppercase; font-family: "Inter", sans-serif; }
</style>
</head>
<body>
  <h1>Compiler Infrastructure 2026</h1>
  <div class="accent-rule"></div>
  <p>A single, editable cover slide for the compiler infrastructure roadmap.</p>
  <div class="wordmark">Pptx-Creator</div>
</body>
</html>
