<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Process-flow — bad</title>
<style>
  body { font-family: "Inter", "Times New Roman", monospace; margin: 16px; color: #111; background: #fafafa; }
  h1 { font-size: 14pt; line-height: 1.0; color: #d23f3f; margin: 0 0 4px; font-family: Georgia, serif; }
  .row { display: flex; gap: 1px; align-items: center; flex-wrap: wrap; }
  .step { background: #fff; border: 1px solid #ddd; border-radius: 2px; padding: 1px 2px; min-width: 70px; }
  .step:nth-child(odd) { background: #d23f3f; color: #fff; }
  .step:nth-child(3n) { background: #f0a020; color: #fff; }
  .step:nth-child(4n) { background: #20d090; color: #fff; }
  .step:nth-child(5n) { background: #7a3fd0; color: #fff; }
  .h { font-size: 8pt; line-height: 1.0; font-weight: 800; font-family: "Inter", sans-serif; }
  .b { font-size: 6pt; line-height: 1.0; font-family: "Inter", sans-serif; }
  .arrow { width: 6px; height: 1px; background: #2070d0; }
  .icon { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #20d090; margin-right: 1px; }
</style>
</head>
<body>
  <h1>Compiler Release Pipeline</h1>
  <div class="row">
    <div class="step"><div class="h">1. Land</div><div class="b">PR merged</div></div>
    <div class="step"><div class="h">2. CI</div><div class="b">tests run</div></div>
    <div class="step"><div class="h">3. Build</div><div class="b">artifacts</div></div>
    <div class="step"><div class="h">4. Sign</div><div class="b">cosign</div></div>
    <div class="step"><div class="h">5. Stage</div><div class="b">staging</div></div>
    <div class="step"><div class="h">6. Canary</div><div class="b">5% traffic</div></div>
    <div class="step"><div class="h">7. Promote</div><div class="b">100%</div></div>
    <div class="step"><div class="h">8. Monitor</div><div class="b">SLOs</div></div>
    <div class="step"><div class="h">9. Rollback</div><div class="b">if needed</div></div>
  </div>
  <div>
    <span class="icon"></span><span class="icon"></span><span class="icon"></span>
    <span class="icon"></span><span class="icon"></span><span class="icon"></span>
    <span class="icon"></span><span class="icon"></span><span class="icon"></span>
  </div>
</body>
</html>
