<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Architecture-layered — borderline</title>
<style>
  body { font-family: "Inter", "Helvetica Neue", Arial, sans-serif; margin: 40px; color: #1a1a1a; background: #ffffff; }
  h1 { font-size: 22pt; line-height: 1.1; color: {colors.primary}; margin: 0 0 18px; font-weight: 700; }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .layer { padding: 14px 20px; border-radius: 6px; background: #f3f4f6; }
  .layer.focal { background: {colors.primary}; color: #fff; }
  .h { font-size: 14pt; line-height: 1.2; font-weight: 700; font-family: "Inter", sans-serif; }
  .b { font-size: 11pt; line-height: 1.35; color: inherit; font-family: "Inter", sans-serif; margin-top: 3px; }
</style>
</head>
<body>
  <h1>Compiler Pipeline Stack</h1>
  <div class="stack">
    <div class="layer"><div class="h">Frontend</div><div class="b">Parsing, lexing, AST construction.</div></div>
    <div class="layer"><div class="h">IR</div><div class="b">Typed intermediate representation.</div></div>
    <div class="layer focal"><div class="h">Optimizer</div><div class="b">Pass pipeline, inlining, DCE, vectorization.</div></div>
    <div class="layer"><div class="h">Backend</div><div class="b">Instruction selection, register allocation.</div></div>
    <div class="layer"><div class="h">Codegen</div><div class="b">Emits machine code and linkable artifacts.</div></div>
  </div>
</body>
</html>
