<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Two-column borderline</title></head>
<body>
  <section class="pptx-slide" data-title="Pros vs. cons" data-archetype="two-column" style="font-family: 'Inter', sans-serif; padding: 0.6in;">
    <h1 style="font-size: 24pt; line-height: 1.15; color: #111827;">Pros vs. cons</h1>
    <div style="display: flex; gap: 0.7in;">
      <div style="flex: 1;">
        <h2 style="font-size: 16pt; color: #6B7280;">Pros</h2>
        <ul style="font-size: 13pt; line-height: 1.45; color: #1F2937;">
          <li>Simple to reason about.</li>
          <li>Easy to roll back.</li>
          <li>Works with our existing tooling.</li>
        </ul>
      </div>
      <div style="flex: 1;">
        <h2 style="font-size: 16pt; color: #6B7280;">Cons</h2>
        <ul style="font-size: 13pt; line-height: 1.45; color: #1F2937;">
          <li>Requires buy-in from three teams.</li>
          <li>Adds two weeks of upfront work.</li>
          <li>Some edge cases are still unproven.</li>
        </ul>
      </div>
    </div>
  </section>
</body>
</html>
